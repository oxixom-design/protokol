<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#FDF2F8"/>
<link rel="manifest" href="./manifest.json"/>
<title>Мой протокол</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100svh}
body{background:#FDF2F8;font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#FDF2F8;padding:14px 16px 0;border-bottom:1px solid #FBCFE8;flex-shrink:0;z-index:10}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr h1{font-size:20px;font-weight:700;color:#1F2937}
.hdr p{font-size:10px;color:#EC4899;letter-spacing:2px;text-transform:uppercase}
.hdr-date{background:#FCE7F3;border:1px solid #FBCFE8;border-radius:10px;padding:5px 12px;text-align:right}
.hdr-day{font-size:12px;font-weight:700;color:#BE185D}
.hdr-d{font-size:10px;color:#9CA3AF}
.tabs{display:flex;gap:4px;background:#FFF5F9;border-radius:12px;padding:4px;margin-bottom:10px}
.tab{flex:1;padding:8px;border:none;border-radius:9px;background:none;color:#9CA3AF;cursor:pointer;font-size:12px;font-weight:500}
.tab.on{background:linear-gradient(135deg,#EC4899,#7C3AED);color:#fff;font-weight:700}
.con{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:24px;scrollbar-width:none}
.con::-webkit-scrollbar{display:none}
/* progress */
.prow{display:flex;justify-content:space-between;margin-bottom:6px}
.prow span{font-size:13px;color:#6B7280}
.prow b{font-size:14px;font-weight:700;color:#1F2937}
.bar{height:6px;background:#FBCFE8;border-radius:4px;margin-bottom:14px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#EC4899,#7C3AED);border-radius:4px;transition:width .4s}
/* section */
.sec{margin-bottom:10px}
.sec-hdr{width:100%;border:none;border-radius:12px;padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left}
.sec-hdr.open{border-radius:12px 12px 0 0}
.sec-t{font-size:14px;font-weight:700;color:#1F2937}
.sec-s{font-size:11px;margin-top:2px}
.sec-body{border-top:none;border-radius:0 0 12px 12px;background:#fff}
/* item */
.item{padding:11px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid #FCE7F3}
.item:first-child{border-top:none}
.chk{width:24px;height:24px;border-radius:50%;border:2px solid #FBCFE8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;cursor:pointer}
.chk.on{color:#fff;font-weight:700}
.iname{flex:1;font-size:14px;font-weight:500;color:#1F2937;cursor:pointer}
.iname.done{text-decoration:line-through;color:#9CA3AF}
.idose{font-size:12px;font-weight:600;padding:2px 8px;border-radius:8px;flex-shrink:0}
.inote{font-size:11px;color:#9CA3AF;margin-top:2px;font-style:italic}
.iwarn{color:#DC2626}
.iedit{background:#FCE7F3;border:none;color:#BE185D;border-radius:7px;padding:4px 8px;cursor:pointer;font-size:11px;flex-shrink:0}
/* todo */
.todo-box{background:#FEF3C7;border:1px solid #D97706;border-radius:12px;padding:12px;margin-top:8px}
.todo-t{font-size:13px;font-weight:700;color:#D97706;margin-bottom:8px}
.todo-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid #FDE68A}
/* card */
.card{background:#fff;border:1px solid #FBCFE8;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px #EC489908}
/* stats */
.pct-box{background:linear-gradient(135deg,#FCE7F3,#EEF2FF);border:1px solid #FBCFE8;border-radius:14px;padding:20px;text-align:center;margin-bottom:14px}
.pct-n{font-size:52px;font-weight:700;line-height:1}
.stat-c{background:#fff;border:1px solid #FBCFE8;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.stat-r{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.stat-b{height:5px;background:#FBCFE8;border-radius:4px;overflow:hidden}
.stat-f{height:100%;border-radius:4px;transition:width .4s}
/* manage */
.mi{background:#fff;border:1px solid #FBCFE8;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px #EC489906}
.mi-n{font-size:13px;font-weight:500;color:#1F2937;flex:1}
.mi-d{font-size:11px;color:#9CA3AF;margin-top:1px}
/* btns */
.btn-pri{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#EC4899,#7C3AED);color:#fff;cursor:pointer;font-size:14px;font-weight:700}
.btn-sec{width:100%;padding:11px;border-radius:12px;border:1px solid #FBCFE8;background:#FFF5F9;color:#6B7280;cursor:pointer;font-size:14px}
.btn-del{width:100%;padding:11px;border-radius:12px;border:1px solid #FEE2E2;background:#FEF2F2;color:#DC2626;cursor:pointer;font-size:13px;margin-top:8px}
.btn-add{width:100%;padding:12px;border-radius:12px;border:1.5px dashed #EC4899;background:#FCE7F310;color:#EC4899;cursor:pointer;font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.fab{position:fixed;bottom:74px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#EC4899,#7C3AED);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px #EC489960;display:flex;align-items:center;justify-content:center;z-index:60}
/* bottom nav */
.bnav{background:#fff;border-top:1px solid #FBCFE8;display:flex;flex-shrink:0;box-shadow:0 -2px 12px #EC489910}
.bnav-btn{flex:1;padding:7px 0 11px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.bnav-ic{font-size:18px}
.bnav-lb{font-size:9px;color:#9CA3AF}
.bnav-lb.on{color:#EC4899;font-weight:700}
.bnav-dot{width:18px;height:3px;border-radius:2px;background:linear-gradient(90deg,#EC4899,#7C3AED)}
/* lab */
.lab-cats{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;padding-bottom:1px}
.lab-cats::-webkit-scrollbar{display:none}
.lab-cat{white-space:nowrap;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #FBCFE8;background:#FFF5F9;color:#9CA3AF}
.lab-cat.on{background:#EC4899;color:#fff;border-color:#EC4899}
.lab-card{background:#fff;border:0.5px solid #FBCFE8;border-radius:11px;padding:11px 13px;margin-bottom:7px;cursor:pointer}
.lab-card.warn{border-color:#FCA5A5;background:#FEF2F2}
.lab-card.exp{background:#FFF5F9;border-color:#FBCFE8}
.lab-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.lab-name{font-size:13px;font-weight:500;color:#1F2937}
.lab-name.w{color:#DC2626}
.lab-val{font-size:14px;font-weight:500;color:#1F2937;text-align:right;white-space:nowrap}
.lab-val.w{color:#DC2626}
.lab-val.lo{color:#1D4ED8}
.lab-sub{font-size:10px;color:#9CA3AF;margin-top:1px}
.lab-sbar{height:3px;background:#E5E7EB;border-radius:2px;margin-top:7px;overflow:hidden}
.lab-sfill{height:100%;border-radius:2px}
.lab-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.lbadge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.lb-warn{background:#FEE2E2;color:#991B1B}
.lb-low{background:#DBEAFE;color:#1E40AF}
.lb-ok{background:#D1FAE5;color:#065F46}
.lb-trend{background:#EEF2FF;color:#3730A3}
.lab-exp{margin-top:9px;padding-top:9px;border-top:1px solid #FCE7F3}
.lab-hist{display:flex;justify-content:space-between;font-size:11px;padding:3px 7px;border-radius:5px;margin-bottom:2px}
.lab-chart{position:relative;height:100px;margin:8px 0}
.lab-rec{background:#FEF3C7;border:1px solid #D97706;border-radius:8px;padding:9px 11px;margin-top:9px}
.lab-rec-t{font-size:11px;font-weight:500;color:#92400E;margin-bottom:5px}
.lab-rec-r{font-size:11px;color:#92400E;padding:1px 0 1px 12px;position:relative}
.lab-rec-r::before{content:"→";position:absolute;left:0}
.lab-warn-sum{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:#991B1B;font-weight:500}
.lab-sec{font-size:10px;font-weight:500;color:#9CA3AF;letter-spacing:.8px;text-transform:uppercase;margin:10px 0 6px}
.lcard{background:#fff;border:0.5px solid #FBCFE8;border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer}
.lcard.lw{border-color:#FCA5A5;background:#FEF2F2}
.lcard.lx{background:#FFF5F9}
.lbadge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.lb-warn{background:#FEE2E2;color:#991B1B}
.lb-low{background:#DBEAFE;color:#1E40AF}
.lb-ok{background:#D1FAE5;color:#065F46}
.lb-trend{background:#EEF2FF;color:#3730A3}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end}
.modal-bg.show{display:flex}
.modal-box{width:100%;max-width:500px;margin:0 auto;background:#fff;border-radius:22px 22px 0 0;padding:0 18px 44px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#FBCFE8;border-radius:2px;margin:12px auto 14px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700;color:#1F2937}
.modal-close{background:#FCE7F3;border:none;color:#9CA3AF;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px}
/* form */
.fg{margin-bottom:12px}
.fl{color:#6B7280;font-size:12px;margin-bottom:5px;display:block;font-weight:600}
.fi{background:#FFF5F9;border:1px solid #FBCFE8;border-radius:10px;color:#1F2937;padding:10px 13px;width:100%;font-size:14px;outline:none}
.fi:focus{border-color:#EC4899}
textarea.fi{resize:none;min-height:70px}
.fpills{display:flex;gap:6px;flex-wrap:wrap}
.fpill{padding:7px 12px;border-radius:20px;border:1.5px solid #FBCFE8;background:#FFF5F9;color:#6B7280;cursor:pointer;font-size:12px}
.fpill.on{border-color:#EC4899;background:#FCE7F3;color:#BE185D;font-weight:700}
/* wish */
.wish-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.wish-stat{background:#fff;border:1px solid #FBCFE8;border-radius:14px;padding:14px;text-align:center}
.wish-n{font-size:28px;font-weight:700}
.wish-l{font-size:12px;color:#6B7280}
.wish-card{background:#fff;border:1px solid #FBCFE8;border-radius:14px;padding:12px;margin-bottom:8px}
.wish-nm{font-size:14px;font-weight:700;color:#1F2937;margin-bottom:4px}
.wish-nm.done{text-decoration:line-through;color:#9CA3AF}
.wish-buy{width:100%;padding:8px;border-radius:10px;border:1px solid #D1FAE5;background:#F0FDF4;color:#059669;cursor:pointer;font-size:13px;font-weight:600;margin-top:8px}
/* proto */
.proto-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.proto-cell{background:#FFF5F9;border:1px solid #FBCFE8;border-radius:10px;padding:7px;text-align:center}
.proto-cl{font-size:10px;color:#9CA3AF;margin-bottom:2px}
.proto-cv{font-size:13px;font-weight:700}
.days-row{display:flex;gap:4px;margin:10px 0}
.day-chip{flex:1;padding:5px 0;border-radius:7px;text-align:center;font-size:10px;border:1px solid transparent}
/* cycle tab */
.cal-card{background:#fff;border:1px solid #FBCFE8;border-radius:14px;padding:14px;margin-bottom:10px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav-btn{background:#FCE7F3;border:none;color:#BE185D;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cal-month{font-size:15px;font-weight:700;color:#1F2937}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:11px;color:#9CA3AF;padding:5px 0;font-weight:600}
.cal-day{text-align:center;padding:7px 2px;border-radius:9px;font-size:13px;color:#374151;line-height:1}
.cal-day.period{background:#FCE7F3;color:#BE185D;font-weight:700}
.cal-day.cy-today{background:linear-gradient(135deg,#EC4899,#7C3AED);color:#fff;font-weight:700}
.cal-day.period.cy-today{background:linear-gradient(135deg,#C94B6B,#EC4899);color:#fff}
.cal-day.other{color:#D1D5DB}
.tg-card{background:#fff;border:1px solid #FBCFE8;border-radius:14px;padding:4px 14px;margin-bottom:10px}
.tg-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid #FCE7F3}
.tg-row:first-child{border-top:none}
.tg-left{flex:1}
.tg-label{font-size:14px;font-weight:600;color:#1F2937}
.tg-sub{font-size:12px;color:#9CA3AF;margin-top:2px}
.tg-sw{width:52px;height:30px;border-radius:15px;background:#FBCFE8;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
.tg-sw.on{background:linear-gradient(135deg,#EC4899,#BE185D)}
.tg-knob{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .25s;box-shadow:0 1px 5px rgba(0,0,0,.18)}
.tg-sw.on .tg-knob{left:25px}
.ph-card{background:#fff;border:1px solid #FBCFE8;border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:16px;align-items:center}
.ph-canvas-wrap{flex-shrink:0}
.ph-info{flex:1;min-width:0}
.ph-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:8px}
.ph-name{font-size:16px;font-weight:700;color:#1F2937;margin-bottom:4px}
.ph-desc{font-size:13px;color:#6B7280;line-height:1.45;margin-bottom:6px}
.ph-count{font-size:12px;color:#9CA3AF}
.cyc-rec{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.cr-card{background:#fff;border:1px solid #FBCFE8;border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start}
.cr-head{font-size:13px;font-weight:700;color:#6B7280;margin-bottom:0;white-space:nowrap;min-width:90px}
.cr-body{flex:1}
.cr-li{font-size:13px;color:#374151;margin:3px 0;padding-left:10px;position:relative;line-height:1.4}
.cr-li::before{content:'·';position:absolute;left:0;color:#EC4899;font-size:18px;line-height:.85}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" async></script>

  <div class="hdr-row">

<div class="con" id="con"></div>

<script>
var LS={
  get:function(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function el(id){return document.getElementById(id);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function uid(){return '_'+Math.random().toString(36).slice(2,8);}

// DEFAULT DATA
var DEF_SECS=[
  {id:'s1',t:'🌙 Натощак',sub:'за 20-30 мин до завтрака',ac:'#7C3AED',items:[
    {id:'i1',nm:'Коллаген морской',dose:'2 саше (10 г)',note:'растворить в воде',st:'active'},
    {id:'i2',nm:'Глутатион липосомальный',dose:'150 мг',note:'растворить в воде',st:'active'},
    {id:'i3',nm:'Спермидин',dose:'500 мг',st:'active'},
    {id:'i4',nm:'Метиленовый синий',dose:'10 мг',note:'⚠️ не с СИОЗС!',st:'active',warn:1},
    {id:'i5',nm:'OptiFibre',dose:'5 г',note:'растворить в воде',st:'active'},
    {id:'i6',nm:'Глицин',dose:'1 г',st:'active'}
  ]},
  {id:'s2',t:'🍳 Завтрак',sub:'с едой — нужен жир!',ac:'#2563EB',items:[
    {id:'i7',nm:'DIM + EGCG + D3',dose:'x2 капс. (DIM 300 мг)',note:'с жирной едой',st:'active'},
    {id:'i8',nm:'B-комплекс',dose:'1 порция',note:'⚠️ B9 = 5-MTHF!',st:'active',warn:1},
    {id:'i9',nm:'Витекс Священный',dose:'400 мг',note:'ТОЛЬКО утром!',st:'active'},
    {id:'i10',nm:'Инозитол',dose:'1 стик (1-я порция)',st:'active'},

    {id:'i17',nm:'Артишок + ALA',dose:'800+91 мг',st:'active'},

  {id:'s4',t:'⏸️ Между едой',sub:'между обедом и ужином',ac:'#D97706',items:[]},
  {id:'s5',t:'🌙 Ужин',sub:'с едой',ac:'#9333EA',items:[
    {id:'i22',nm:'Кальция бутират',dose:'3 капс. (666 мг)',note:'питает кишечник ночью',st:'active'},
    {id:'i23',nm:'Карликовая пальма',dose:'400 мг',note:'с жирной едой',st:'active'},
    {id:'i24',nm:'Глицин',dose:'1 г',note:'для сна',st:'active'}
  ]}
];
var DEF_PROTOS=[
  {id:'p1',nm:'GHK-Cu + BPC-157 + KPV + TB-500',color:'#7C3AED',st:'active',
   comps:[{nm:'GHK-Cu',mg:65},{nm:'BPC-157',mg:25},{nm:'KPV',mg:20},{nm:'TB-500',mg:15}],
   bacMl:1,dosePerInjMg:3,days:[1,2,3,4,5,6,0],startDate:todayStr(),
   remEn:false,remTime:'08:00',notes:'SC подкожно. 2-4°C.'}
];
var DEF_WISH=[
  {id:'w1',nm:'Метилкобаламин B12',dose:'1000-2000 мкг',note:'MTRR гомозигота — критично!',pri:'high',st:'want'},
  {id:'w2',nm:'Магний глицинат',dose:'300-400 мг',note:'MTHFR + KCNJ11 + сон',pri:'high',st:'want'},
  {id:'w3',nm:'Витамин D3',dose:'2000-3000 МЕ',note:'VDR bb генотип',pri:'high',st:'want'},
  {id:'w4',nm:'CoQ10 убихинол',dose:'100-150 мг',note:'SOD2 гетерозигота',pri:'med',st:'want'},
  {id:'w5',nm:'Карнозин L',dose:'500-1000 мг',note:'Защита от гликирования (GLO1)',pri:'med',st:'want'},
  {id:'w6',nm:'Бенфотиамин',dose:'150 мг',note:'Синергия с карнозином',pri:'med',st:'want'}

// STATE

  var h='';

      var sdone=0;for(var sd=0;sd<act.length;sd++){if(checks[tod+'_'+act[sd].id])sdone++;}

      h+='<div style="display:flex;align-items:center;gap:8px"><b style="font-size:12px;color:'+(sdone===act.length?'#059669':sec.ac)+'">'+sdone+'/'+act.length+'</b>'

      h+='</button>';

        h+='<div class="sec-body" style="border:1.5px solid '+sec.ac+'30">';

          h+='</div>';
          if(it.note)h+='<div class="inote'+(it.warn?' iwarn':'')+'">'+esc(it.note)+'</div>';
          h+='</div>';
          h+='<button class="iedit" onclick="openEditItem(\''+sec.id+'\',\''+it.id+'\')">✏️</button>';
          h+='</div>';
        }
        h+='</div>';
      }
      h+='</div>';
    }

  } else if(stab==='manage'){
    h+='<button class="btn-add" onclick="openAdd()"><span style="font-size:18px">+</span> Добавить добавку</button>';
    for(var ms=0;ms<secs.length;ms++){

  } else {
    var aa2=[];for(var ss2=0;ss2<secs.length;ss2++){for(var ii2=0;ii2<secs[ss2].items.length;ii2++){if(secs[ss2].items[ii2].st==='active')aa2.push(secs[ss2].items[ii2]);}}

      var stSec=secs[st2];

    }
    h+='<button onclick="resetToday()" style="width:100%;padding:12px;border-radius:12px;border:1px solid #FEE2E2;background:#FEF2F2;color:#DC2626;cursor:pointer;font-size:13px;margin-top:8px">🔄 Сбросить отметки</button>';
  }
  el('con').innerHTML=h;

// PEPTIDES
function calcUnits(p){
  var totalMg=0;
  for(var i=0;i<p.comps.length;i++)totalMg+=(parseFloat(p.comps[i].mg)||0);
  var bac=parseFloat(p.bacMl)||1;
  var dose=parseFloat(p.dosePerInjMg)||0;
  var conc=totalMg/bac;
  var vol=conc>0?dose/conc:0;
  var units=vol*100;
  var totalI=dose>0?Math.floor(totalMg/dose):0;
  var daysLeft=null;
  if(p.startDate&&p.days&&p.days.length){
    var injPerWeek=p.days.length;
    var weeksLeft=Math.floor(totalI/injPerWeek);
    var d=new Date(p.startDate+'T00:00:00');
    d.setDate(d.getDate()+weeksLeft*7);
    daysLeft=Math.max(0,Math.floor((d-new Date())/(1000*60*60*24)));
  }
  return{units:units.toFixed(1),totalI:totalI,daysLeft:daysLeft,conc:(totalMg/bac).toFixed(2),vol:vol.toFixed(3)};
}

// ACTIONS

}

  fStatus=s;

function saveSup(){
  var nm=(el('f-nm')||{}).value||'';
  var dose=(el('f-dose')||{}).value||'';
  var note=(el('f-note')||{}).value||'';
  var warn=((el('f-warn')||{}).className||'').indexOf(' on')>=0?1:0;
  var sid=(el('f-sec')||{}).value||secs[0].id;
  var st=fStatus||'active';
  if(!nm)return;
  var m=modData;
  if(m.item){
    // edit
    var removed=false;
    for(var i=0;i<secs.length;i++){
      for(var j=secs[i].items.length-1;j>=0;j--){
        if(secs[i].items[j].id===m.item.id){secs[i].items.splice(j,1);removed=true;break;}
      }
      if(removed)break;
    }
    for(var k=0;k<secs.length;k++){
      if(secs[k].id===sid){secs[k].items.push({id:m.item.id,nm:nm,dose:dose,note:note,warn:warn,st:st});break;}
    }
  } else {
    for(var s=0;s<secs.length;s++){
      if(secs[s].id===sid){secs[s].items.push({id:uid(),nm:nm,dose:dose,note:note,warn:warn,st:st});break;}
    }
  }
  LS.set('secs3',secs);closeMod();render();
}
function deleteSup(){
  var m=modData;
  if(!m.item)return;
  for(var i=0;i<secs.length;i++){
    for(var j=secs[i].items.length-1;j>=0;j--){
      if(secs[i].items[j].id===m.item.id){secs[i].items.splice(j,1);break;}
    }
  }
  LS.set('secs3',secs);closeMod();render();
}

function getCycleGroups(){
  var sorted=cycleData.periodDays.slice().sort();
  var groups=[];var cur=null;
  for(var i=0;i<sorted.length;i++){
    var d=sorted[i];
    if(!cur){cur={start:d,end:d};}
    else{
      var prev=new Date(cur.end+'T00:00:00'),curr=new Date(d+'T00:00:00');
      var diff=Math.round((curr-prev)/86400000);
      if(diff===1){cur.end=d;}
      else if(diff>1){groups.push(cur);cur={start:d,end:d};}
    }
  }
  if(cur)groups.push(cur);
  return groups;
}
function getAvgLen(){
  var groups=getCycleGroups();
  if(groups.length<2)return 28;
  var diffs=[];
  for(var i=1;i<groups.length;i++){
    var d=Math.round((new Date(groups[i].start)-new Date(groups[i-1].start))/86400000);
    if(d>15&&d<60)diffs.push(d);
  }
  if(!diffs.length)return 28;
  return Math.round(diffs.reduce(function(a,b){return a+b;},0)/diffs.length);
}
function getCyclePhase(){
  var groups=getCycleGroups();
  if(!groups.length)return null;
  var last=groups[groups.length-1];
  var avgLen=getAvgLen();
  var start=new Date(last.start+'T00:00:00');
  var now=new Date();now.setHours(0,0,0,0);
  var diff=Math.floor((now-start)/86400000);
  if(diff<0)return null;
  var pLen=Math.min(10,Math.max(2,Math.round((new Date(last.end)-new Date(last.start))/86400000)+1));
  var cycleDay=(diff%avgLen)+1;
  var cn=Math.floor(diff/avgLen)+1;
  var fEnd=Math.round(avgLen*0.464);
  var oEnd=fEnd+3;
  var idx=cycleDay<=pLen?0:cycleDay<=fEnd?1:cycleDay<=oEnd?2:3;
  return{idx:idx,day:cycleDay,total:avgLen,pLen:pLen,cn:cn,daysLeft:avgLen-cycleDay};
}

function drawCycleWheel(phase){
  var canvas=el('cycWheel');
  if(!canvas)return;
  var dpr=window.devicePixelRatio||1;
  var size=140;
  canvas.width=size*dpr;
  canvas.height=size*dpr;
  canvas.style.width=size+'px';
  canvas.style.height=size+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  var cx=70,cy=70,R=62,r2=44,gap=0.04;
  var avgLen=phase?phase.total:28;
  var pLen=phase?phase.pLen:5;
  var fEnd=Math.round(avgLen*0.464);
  var oEnd=fEnd+3;
  var phaseDays=[pLen,fEnd-pLen,3,avgLen-oEnd];
  var colors=['#C94B6B','#3E9B62','#D08530','#7B6BB5'];
  var inactive='#F3E8EE';
  var sa=-Math.PI/2;
  for(var i=0;i<4;i++){
    var angle=(phaseDays[i]/avgLen)*Math.PI*2;
    var ea=sa+angle-gap;
    ctx.beginPath();
    ctx.arc(cx,cy,R,sa+gap/2,ea);
    ctx.arc(cx,cy,r2,ea,sa+gap/2,true);
    ctx.closePath();
    ctx.fillStyle=phase&&phase.idx===i?colors[i]:inactive;
    ctx.fill();
    if(phase&&phase.idx!==i){
      ctx.beginPath();
      ctx.arc(cx,cy,R,sa+gap/2,ea);
      ctx.arc(cx,cy,r2,ea,sa+gap/2,true);
      ctx.closePath();
      ctx.fillStyle=colors[i]+'38';
      ctx.fill();
    }
    sa+=angle;
  }
  if(phase){
    var dotA=-Math.PI/2+(phase.day/phase.total)*Math.PI*2;
    var mr=(R+r2)/2;
    var dx=cx+mr*Math.cos(dotA),dy=cy+mr*Math.sin(dotA);
    ctx.beginPath();ctx.arc(dx,dy,5,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.strokeStyle=colors[phase.idx];ctx.lineWidth=2.5;ctx.stroke();
    ctx.fillStyle='#1F2937';
    ctx.font='700 16px system-ui,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('День '+phase.day,cx,cy-5);
    ctx.font='11px system-ui,sans-serif';
    ctx.fillStyle='#9CA3AF';
    ctx.fillText('из '+phase.total,cx,cy+11);
  }else{
    ctx.fillStyle='#9CA3AF';
    ctx.font='11px system-ui,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('нет данных',cx,cy);
  }
}

function labStatus(t){
  if(!t.values||!t.values.length)return'none';
  if(t.qual){return t.values[t.values.length-1].pos?'hi':'ok';}
  var lv=t.values[t.values.length-1].v;
  if(typeof lv!=='number')return'ok';
  if(lv>t.hi)return'hi';
  if(t.lo>0&&lv<t.lo)return'lo';
  return'ok';
}
function countLabWarns(){
  var n=0,tests=labData.tests;
  for(var i=0;i<tests.length;i++){var s=labStatus(tests[i]);if(s==='hi'||s==='lo')n++;}
  return n;
}
function getLabSorted(cat){
  var tests=labData.tests.filter(function(t){return t.cat===cat&&t.values&&t.values.length;});
  return tests.sort(function(a,b){
    var sa=labStatus(a),sb=labStatus(b);
    var wa=(sa==='hi'||sa==='lo')?0:1;
    var wb=(sb==='hi'||sb==='lo')?0:1;
    return wa-wb;
  });
}
function setLabCat(c){
  labCat=c;
  if(labExpanded){Object.keys(labCharts).forEach(function(k){if(labCharts[k]){labCharts[k].destroy();delete labCharts[k];}});labExpanded=null;}
  renderLab();
}
function toggleLabCard(id){
  Object.keys(labCharts).forEach(function(k){if(labCharts[k]){labCharts[k].destroy();delete labCharts[k];}});
  labExpanded=labExpanded===id?null:id;
  renderLab();
  if(labExpanded){
    var t=labData.tests.find(function(x){return x.id===labExpanded;});
    if(t&&t.values.length>1&&!t.qual)setTimeout(function(){drawLabChart(t);},100);
  }
}
function drawLabChart(t){
  if(typeof Chart==='undefined')return;
  var canvas=el('lch-'+t.id);if(!canvas)return;
  if(labCharts[t.id])labCharts[t.id].destroy();
  var vals=t.values.map(function(m){return m.v;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  var pad=Math.max((mx-mn)*0.2,mx*0.05,1);
  labCharts[t.id]=new Chart(canvas,{
    type:'line',
    data:{
      labels:t.values.map(function(m){return fmtDate(m.d);}),
      datasets:[{data:vals,borderColor:'#EC4899',backgroundColor:'rgba(236,72,153,0.07)',borderWidth:2,pointRadius:4,tension:0.3,fill:true,
        pointBackgroundColor:vals.map(function(v){return v>t.hi?'#DC2626':(t.lo>0&&v<t.lo?'#2563EB':'#EC4899');})}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        y:{min:mn-pad,max:mx+pad,grid:{color:'rgba(251,207,232,0.35)'},ticks:{font:{size:9},color:'#9CA3AF',maxTicksLimit:4}},
        x:{grid:{display:false},ticks:{font:{size:9},color:'#9CA3AF'}}
      }
    }
  });
}
function renderLabCard(t){
  var st=labStatus(t);var lm=t.values[t.values.length-1];
  var isExp=labExpanded===t.id;var isWarn=st==='hi'||st==='lo';
  var valStr=t.qual?lm.v:(lm.v+' '+t.unit);
  var pct=50;
  if(!t.qual&&typeof lm.v==='number'&&t.hi){pct=Math.min(100,Math.max(0,((lm.v-(t.lo||0))/(t.hi-(t.lo||0)))*100));}
  var barC=st==='ok'?'#059669':'#DC2626';
  var inner='<div style="display:flex;justify-content:space-between;align-items:flex-start">'
    +'<div><div style="font-size:13px;font-weight:500;color:'+(isWarn?'#DC2626':'#1F2937')+'">'+esc(t.name)+'</div>'
    +(t.refN?'<div style="font-size:10px;color:#9CA3AF;font-style:italic">'+esc(t.refN)+'</div>':'')
    +'<div style="font-size:10px;color:#9CA3AF">'+fmtDate(lm.d)+'</div></div>'
    +'<div style="text-align:right"><div style="font-size:14px;font-weight:500;color:'+(st==='hi'?'#DC2626':st==='lo'?'#2563EB':'#1F2937')+'">'+esc(valStr)+'</div>'
    +(t.qual?'':'<div style="font-size:10px;color:#9CA3AF">норма: '+(t.lo>0?t.lo+'–':'')+t.hi+(t.unit?' '+t.unit:'')+'</div>')
    +'</div></div>';
  if(!t.qual)inner+='<div style="height:3px;background:#E5E7EB;border-radius:2px;margin-top:7px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+barC+';border-radius:2px"></div></div>';
  inner+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
  if(st==='hi')inner+='<span class="lbadge lb-warn">⚠ Выше нормы</span>';
  else if(st==='lo')inner+='<span class="lbadge lb-low">⚠ Ниже нормы</span>';
  else inner+='<span class="lbadge lb-ok">✓ Норма</span>';
  if(t.values.length>1)inner+='<span class="lbadge lb-trend">📈 '+t.values.length+' изм.</span>';
  inner+='</div>';
  if(isExp){
    inner+='<div class="lab-exp">';
    inner+='<div style="font-size:10px;color:#9CA3AF;font-weight:500;margin-bottom:5px">ИСТОРИЯ</div>';
    var rv=t.values.slice().reverse();
    for(var ri=0;ri<rv.length;ri++){
      var m=rv[ri];
      var ms=t.qual?(m.pos?'hi':'ok'):(typeof m.v==='number'?(m.v>t.hi?'hi':(t.lo>0&&m.v<t.lo?'lo':'ok')):'ok');
      var mw=ms!=='ok';
      inner+='<div class="lab-hist" style="background:'+(mw?'#FEE2E2':'#F9FAFB')+'">'
        +'<span style="color:#6B7280">'+fmtDate(m.d)+'</span>'
        +'<span style="font-weight:500;color:'+(mw?'#DC2626':'#1F2937')+'">'+esc(String(m.v))+' '+esc(t.unit||'')+'</span></div>';
    }
    if(t.values.length>1&&!t.qual)inner+='<div class="lab-chart"><canvas id="lch-'+t.id+'" role="img" aria-label="График '+esc(t.name)+'"></canvas></div>';
    if(t.recs&&t.recs.length){
      inner+='<div class="lab-rec"><div class="lab-rec-t">Что делать</div>';
      for(var rci=0;rci<t.recs.length;rci++)inner+='<div class="lab-rec-r">'+esc(t.recs[rci])+'</div>';
      inner+='</div>';
    }
    inner+='</div>';
  }
  return'<div class="lcard'+(isWarn?' lw':'')+(isExp?' lx':'')+'" onclick="toggleLabCard(\''+t.id+'\')">'+inner+'</div>';
}
function renderLab(){
  var wc=countLabWarns();
  var h='<div style="display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:12px;margin-bottom:2px">';
  for(var ci=0;ci<LAB_CATS.length;ci++){
    var c=LAB_CATS[ci];var on=labCat===c.id;
    h+='<button onclick="setLabCat(\''+c.id+'\')" style="white-space:nowrap;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid '+(on?'#EC4899':'#FBCFE8')+';background:'+(on?'#EC4899':'#FFF5F9')+';color:'+(on?'#fff':'#9CA3AF')+'">'+c.l+'</button>';
  }
  h+='</div>';
  if(wc>0)h+='<div class="lab-warn-sum">⚠ '+wc+' показател'+(wc===1?'ь':wc<5?'я':'ей')+' вне нормы</div>';
  if(labCat==='all'){
    for(var gi=0;gi<LAB_GROUPS.length;gi++){
      var g=LAB_GROUPS[gi];var gt=getLabSorted(g.id);
      if(!gt.length)continue;
      h+='<div class="lab-sec">'+g.l+'</div>';
      for(var ti=0;ti<gt.length;ti++)h+=renderLabCard(gt[ti]);
    }
  }else{
    var tests=getLabSorted(labCat);
    if(!tests.length)h+='<div style="text-align:center;padding:30px;color:#9CA3AF;font-size:14px">Нет данных в этой категории</div>';
    for(var i2=0;i2<tests.length;i2++)h+=renderLabCard(tests[i2]);
  }
  h+='<button class="btn-add" onclick="openLabAdd()"><span style="font-size:18px">+</span> Добавить результат</button>';
  el('con').innerHTML=h;
  if(labExpanded){
    var et=labData.tests.find(function(x){return x.id===labExpanded;});
    if(et&&et.values.length>1&&!et.qual)setTimeout(function(){drawLabChart(et);},100);
  }
}
var labAddQual=0;
function openLabAdd(){
  modType='lab';modData={};labAddQual=0;
  el('mod-title').textContent='Добавить результат';
  var catHtml='';
  for(var i=0;i<LAB_CATS.length;i++){if(LAB_CATS[i].id==='all')continue;catHtml+='<option value="'+LAB_CATS[i].id+'">'+LAB_CATS[i].l+'</option>';}
  var h='<div class="fg"><label class="fl">Категория</label><select class="fi" id="la-cat" onchange="labCatChange()">'+catHtml+'</select></div>';
  h+='<div class="fg"><label class="fl">Показатель</label><select class="fi" id="la-test" onchange="labTestChange()"></select></div>';
  h+='<div class="fg"><label class="fl">Дата</label><input class="fi" type="date" id="la-date" value="'+todayStr()+'"/></div>';
  h+='<div class="fg" id="la-num-fg"><label class="fl" id="la-unit-lbl">Значение</label><input class="fi" type="number" step="any" id="la-val" placeholder="Введи число"/></div>';
  h+='<div class="fg" style="display:none" id="la-qual-fg"><label class="fl">Результат</label><div class="fpills"><button type="button" class="fpill on" id="la-neg" onclick="labSetQual(0)">Отрицательный</button><button type="button" class="fpill" id="la-pos" onclick="labSetQual(1)">Положительный</button></div></div>';
  h+='<div style="display:flex;gap:8px;margin-top:16px"><button class="btn-sec" style="flex:1" onclick="closeMod()">Отмена</button><button class="btn-pri" style="flex:2" onclick="saveLabResult()">Сохранить</button></div>';
  el('mod-body').innerHTML=h;
  el('modal').classList.add('show');
  labCatChange();
}
function labSetQual(v){
  labAddQual=v;
  var n=el('la-neg'),p=el('la-pos');
  if(n)n.className='fpill'+(v===0?' on':'');
  if(p)p.className='fpill'+(v===1?' on':'');
}
function labCatChange(){
  var cat=(el('la-cat')||{}).value||'horm';
  var tests=labData.tests.filter(function(t){return t.cat===cat;});
  var sel=el('la-test');if(!sel)return;
  sel.innerHTML=tests.map(function(t){return'<option value="'+t.id+'">'+t.name+'</option>';}).join('');
  labTestChange();
}
function labTestChange(){
  var tid=(el('la-test')||{}).value;
  var t=labData.tests.find(function(x){return x.id===tid;});
  var nfg=el('la-num-fg'),qfg=el('la-qual-fg');
  if(!t)return;
  if(t.qual){if(nfg)nfg.style.display='none';if(qfg)qfg.style.display='';}
  else{if(nfg)nfg.style.display='';if(qfg)qfg.style.display='none';
    var ul=el('la-unit-lbl');if(ul)ul.textContent='Значение'+(t.unit?' ('+t.unit+')':'');}
}
function saveLabResult(){
  var tid=(el('la-test')||{}).value;var d=(el('la-date')||{}).value;
  if(!tid||!d)return;
  var t=labData.tests.find(function(x){return x.id===tid;});if(!t)return;
  var entry={d:d};
  if(t.qual){entry.v=labAddQual?'Положит.':'Отриц.';entry.pos=!!labAddQual;}
  else{var vv=parseFloat((el('la-val')||{}).value);if(isNaN(vv))return;entry.v=vv;}
  t.values.push(entry);
  t.values.sort(function(a,b){return a.d>b.d?1:-1;});
  LS.set('lab_v1',labData);
  closeMod();
  Object.keys(labCharts).forEach(function(k){if(labCharts[k]){labCharts[k].destroy();delete labCharts[k];}});
  labExpanded=null;
  renderLab();
}

// MODAL
function closeMod(){el('modal').classList.remove('show');}

// INIT
render();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
